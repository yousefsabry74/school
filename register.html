<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="إنشاء حساب طالب جديد على منصة التعلم الذكية"
    />
    <title>إنشاء حساب طالب | منصة التعلم الذكية</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/@phosphor-icons/web@2.0.3" defer></script>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/pages/login.css" />
  </head>
  <body class="login-bg">
    <div class="login-card">
      <div class="login-logo">
        <span class="login-logo-icon animate-pulse">🧠</span>
        <div class="login-logo-text">إنشاء حساب طالب جديد</div>
        <div class="login-subtitle">
          سيتم تسجيل الحساب الجديد كطالب تلقائيًا
        </div>
      </div>

      <div class="login-error" id="reg-error"></div>

      <div class="form-group">
        <label class="form-label" for="reg-username">
          <i class="ph ph-user-fill"></i> اسم المستخدم
        </label>
        <input
          class="form-input"
          id="reg-username"
          type="text"
          placeholder="مثال: yousef_2026"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-email">
          <i class="ph ph-envelope-fill"></i> البريد الإلكتروني
        </label>
        <input
          class="form-input"
          id="reg-email"
          type="email"
          placeholder="example@mail.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-password">
          <i class="ph ph-lock-fill"></i> كلمة المرور
        </label>
        <input
          class="form-input"
          id="reg-password"
          type="password"
          placeholder="6 أحرف على الأقل"
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-class">
          <i class="ph ph-users-three-fill"></i> الفصل الدراسي
        </label>
        <input
          class="form-input"
          id="reg-class"
          type="text"
          placeholder="مثال: 5-أ"
        />
      </div>

      <button class="login-btn" id="register-btn">
        <i class="ph ph-user-plus-fill"></i> إنشاء الحساب
      </button>

      <p
        style="
          text-align: center;
          margin-top: 15px;
          font-size: 13px;
          color: var(--text2);
        "
      >
        لديك حساب بالفعل؟
        <a href="index.html" style="color: var(--primary-l)">سجل دخولك هنا</a>
      </p>
    </div>

    <script src="js/config.js" defer></script>
    <script src="js/utils.js" defer></script>
    <script src="js/services/auth.service.js" defer></script>
    <script src="js/pages/register.js" defer></script>
  </body>
</html>
